name: Main Post Merge

on:
  push:
    branches:
      - main

concurrency:
  group: main-post-merge-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  edge-and-tag:
    name: edge-and-tag
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_ENABLED: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          OWNER_LOWER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          DATE_VALUE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "owner_lower=$OWNER_LOWER"
            echo "short_sha=$SHORT_SHA"
            echo "date_value=$DATE_VALUE"
            echo "tags<<EOF"
            echo "ghcr.io/${OWNER_LOWER}/sub2api:edge"
            echo "ghcr.io/${OWNER_LOWER}/sub2api:sha-${SHORT_SHA}"
            if [ "$DOCKERHUB_ENABLED" = "true" ]; then
              echo "${DOCKERHUB_USERNAME}/sub2api:edge"
              echo "${DOCKERHUB_USERNAME}/sub2api:sha-${SHORT_SHA}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        if: ${{ env.DOCKERHUB_ENABLED == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Publish edge images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            COMMIT=${{ github.sha }}
            DATE=${{ steps.meta.outputs.date_value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Wei-Shaw/sub2api.git 2>/dev/null || true
          git fetch origin --tags --force
          git fetch upstream main --tags --force

      - name: Detect releasable upstream tag
        id: upstream_tag
        shell: bash
        run: |
          set -euo pipefail
          CANDIDATE=""
          while read -r tag; do
            [ -z "$tag" ] && continue
            TAG_COMMIT="$(git rev-list -n 1 "$tag")"
            if git merge-base --is-ancestor "$TAG_COMMIT" HEAD; then
              if ! git ls-remote --tags origin "refs/tags/$tag" | grep -q .; then
                CANDIDATE="$tag"
                break
              fi
            fi
          done < <(git tag --list 'v[0-9]*' --sort=-v:refname)

          if [ -z "$CANDIDATE" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MESSAGE_FILE="$(mktemp)"
          git for-each-ref "refs/tags/$CANDIDATE" --format='%(contents)' > "$MESSAGE_FILE"

          {
            echo "found=true"
            echo "name=$CANDIDATE"
            echo "message_file=$MESSAGE_FILE"
          } >> "$GITHUB_OUTPUT"

      - name: Push upstream release tag to fork
        if: steps.upstream_tag.outputs.found == 'true'
        run: |
          git tag -d "${{ steps.upstream_tag.outputs.name }}"
          git tag -a "${{ steps.upstream_tag.outputs.name }}" -F "${{ steps.upstream_tag.outputs.message_file }}" HEAD
          git push origin "refs/tags/${{ steps.upstream_tag.outputs.name }}"
