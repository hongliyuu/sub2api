name: Main Post Merge

on:
  push:
    branches:
      - main

concurrency:
  group: main-post-merge-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  edge-and-tag:
    name: edge-and-tag
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_ENABLED: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          OWNER_LOWER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          DATE_VALUE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "owner_lower=$OWNER_LOWER"
            echo "short_sha=$SHORT_SHA"
            echo "date_value=$DATE_VALUE"
            echo "tags<<EOF"
            echo "ghcr.io/${OWNER_LOWER}/sub2api:edge"
            echo "ghcr.io/${OWNER_LOWER}/sub2api:sha-${SHORT_SHA}"
            if [ "$DOCKERHUB_ENABLED" = "true" ]; then
              echo "${DOCKERHUB_USERNAME}/sub2api:edge"
              echo "${DOCKERHUB_USERNAME}/sub2api:sha-${SHORT_SHA}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        if: ${{ env.DOCKERHUB_ENABLED == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Publish edge images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            COMMIT=${{ github.sha }}
            DATE=${{ steps.meta.outputs.date_value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Wei-Shaw/sub2api.git 2>/dev/null || true
          git fetch origin --tags --force
          git fetch upstream main --tags --force

      - name: Detect releasable upstream tags
        id: upstream_tag
        shell: bash
        run: |
          set -euo pipefail
          TAGS=()
          while read -r tag; do
            [ -z "$tag" ] && continue
            TAG_COMMIT="$(git rev-list -n 1 "$tag")"
            if git merge-base --is-ancestor "$TAG_COMMIT" HEAD; then
              if ! git ls-remote --tags origin "refs/tags/$tag" | grep -q .; then
                TAGS+=("$tag")
              fi
            fi
          done < <(git tag --list 'v[0-9]*' --sort=v:refname)

          if [ ${#TAGS[@]} -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Use the highest version tag as the primary
          LATEST="${TAGS[-1]}"
          MESSAGE_FILE="$(mktemp)"
          git for-each-ref "refs/tags/$LATEST" --format='%(contents)' > "$MESSAGE_FILE"

          {
            echo "found=true"
            echo "name=$LATEST"
            echo "message_file=$MESSAGE_FILE"
            echo "all_tags=${TAGS[*]}"
          } >> "$GITHUB_OUTPUT"

      - name: Push upstream release tags to fork
        if: steps.upstream_tag.outputs.found == 'true'
        run: |
          # Push tags in ascending version order so the highest version is pushed last
          # This ensures GitHub marks the highest version as "Latest"
          for tag in ${{ steps.upstream_tag.outputs.all_tags }}; do
            echo "Pushing tag: $tag"
            MSG_FILE="$(mktemp)"
            git for-each-ref "refs/tags/$tag" --format='%(contents)' > "$MSG_FILE" 2>/dev/null || echo "$tag" > "$MSG_FILE"
            git tag -d "$tag"
            git tag -a "$tag" -F "$MSG_FILE" HEAD
            git push origin "refs/tags/$tag"
          done
