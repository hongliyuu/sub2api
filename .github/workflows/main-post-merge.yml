name: Main Post Merge

on:
  push:
    branches:
      - main

concurrency:
  group: main-post-merge-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  edge-and-tag:
    name: edge-and-tag
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_ENABLED: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          OWNER_LOWER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          DATE_VALUE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "owner_lower=$OWNER_LOWER"
            echo "short_sha=$SHORT_SHA"
            echo "date_value=$DATE_VALUE"
            echo "tags<<EOF"
            echo "ghcr.io/${OWNER_LOWER}/sub2api:edge"
            echo "ghcr.io/${OWNER_LOWER}/sub2api:sha-${SHORT_SHA}"
            if [ "$DOCKERHUB_ENABLED" = "true" ]; then
              echo "${DOCKERHUB_USERNAME}/sub2api:edge"
              echo "${DOCKERHUB_USERNAME}/sub2api:sha-${SHORT_SHA}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        if: ${{ env.DOCKERHUB_ENABLED == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Publish edge images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            COMMIT=${{ github.sha }}
            DATE=${{ steps.meta.outputs.date_value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Wei-Shaw/sub2api.git 2>/dev/null || true
          git fetch origin --tags --force
          git fetch upstream main --tags --force

      - name: Detect new upstream tags
        id: upstream_tag
        shell: bash
        run: |
          set -euo pipefail

          # 获取 fork 当前最高版本
          FORK_LATEST=$(git tag --list 'v[0-9]*' --sort=-v:refname | head -1 || echo "v0.0.0")
          FORK_VERSION=${FORK_LATEST#v}

          echo "Fork latest version: $FORK_VERSION"

          # 收集需要同步的 tag（包括需要强制替换的）
          TAGS=()
          while read -r tag; do
            [ -z "$tag" ] && continue
            TAG_VERSION=${tag#v}

            # 版本比较：只收集比 fork 更新的版本
            if [ "$(printf '%s\n' "$FORK_VERSION" "$TAG_VERSION" | sort -V | tail -1)" = "$TAG_VERSION" ] && [ "$TAG_VERSION" != "$FORK_VERSION" ]; then
              TAG_COMMIT="$(git rev-list -n 1 "$tag")"
              if git merge-base --is-ancestor "$TAG_COMMIT" HEAD; then
                # 检查 fork 是否已有此 tag
                if git ls-remote --tags origin "refs/tags/$tag" | grep -q .; then
                  # 比较 commit，如果不同则需要强制替换
                  FORK_TAG_COMMIT="$(git ls-remote --tags origin "refs/tags/$tag" | awk '{print $1}')"
                  if [ "$TAG_COMMIT" != "$FORK_TAG_COMMIT" ]; then
                    TAGS+=("$tag")
                    echo "Found tag with changes: $tag (will force replace)"
                  fi
                else
                  TAGS+=("$tag")
                  echo "Found new tag: $tag (newer than $FORK_VERSION)"
                fi
              fi
            fi
          done < <(git tag --list 'v[0-9]*' --sort=v:refname)

          if [ ${#TAGS[@]} -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No new tags to sync"
            exit 0
          fi

          LATEST="${TAGS[-1]}"
          MESSAGE_FILE="$(mktemp)"
          git for-each-ref "refs/tags/$LATEST" --format='%(contents)' > "$MESSAGE_FILE"

          {
            echo "found=true"
            echo "name=$LATEST"
            echo "message_file=$MESSAGE_FILE"
            echo "all_tags=${TAGS[*]}"
          } >> "$GITHUB_OUTPUT"

          echo "Will sync ${#TAGS[@]} tag(s): ${TAGS[*]}"

      - name: Push upstream release tags sequentially
        if: steps.upstream_tag.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          for tag in ${{ steps.upstream_tag.outputs.all_tags }}; do
            echo "=== Processing tag: $tag ==="

            # 检查 fork 是否已有此 tag
            if git ls-remote --tags origin "refs/tags/$tag" | grep -q .; then
              echo "Tag exists in fork, will force replace"

              # 删除旧的 GitHub Release（如果存在）
              if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
                echo "Deleting existing release: $tag"
                gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes
              fi
            fi

            # 重新创建 tag 并强制推送
            MSG_FILE="$(mktemp)"
            git for-each-ref "refs/tags/$tag" --format='%(contents)' > "$MSG_FILE" 2>/dev/null || echo "$tag" > "$MSG_FILE"
            git tag -d "$tag" 2>/dev/null || true
            git tag -a "$tag" -F "$MSG_FILE" HEAD
            git push --force origin "refs/tags/$tag"

            echo "Waiting for release workflow to start..."
            sleep 60

            # 等待 release workflow 完成（最多 40 分钟）
            for i in {1..40}; do
              RUNS=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow=release.yml --json status,conclusion,createdAt --limit 5)
              LATEST_RUN=$(echo "$RUNS" | jq -r 'first(.[] | select(.createdAt > (now - 3600 | todate)))')

              if [ -n "$LATEST_RUN" ] && [ "$LATEST_RUN" != "null" ]; then
                STATUS=$(echo "$LATEST_RUN" | jq -r '.status')
                if [ "$STATUS" = "completed" ]; then
                  CONCLUSION=$(echo "$LATEST_RUN" | jq -r '.conclusion')
                  echo "Release workflow completed with: $CONCLUSION"
                  break
                fi
              fi

              echo "Waiting... ($i/40)"
              sleep 60
            done

            echo "=== Finished processing $tag ==="
          done
