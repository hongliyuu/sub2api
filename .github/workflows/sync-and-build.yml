name: Sync Upstream and Build Docker

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:  # Manual trigger

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Wei-Shaw/sub2api.git || true
          git fetch upstream

      - name: Sync with upstream
        id: sync
        run: |
          git merge upstream/main --no-edit || {
            echo "sync_failed=true" >> $GITHUB_OUTPUT
            exit 1
          }
          echo "sync_failed=false" >> $GITHUB_OUTPUT

      - name: Push changes
        if: steps.sync.outputs.sync_failed == 'false'
        run: git push origin main

      - name: Set up Docker Buildx
        if: steps.sync.outputs.sync_failed == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.sync.outputs.sync_failed == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.sync.outputs.sync_failed == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sub2api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sub2api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
