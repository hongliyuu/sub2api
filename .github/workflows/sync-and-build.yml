name: Sync Upstream and Build Docker

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:  # Manual trigger

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Wei-Shaw/sub2api.git || true
          git fetch upstream

      - name: Sync with upstream
        id: sync
        run: |
          git merge upstream/main --no-edit || {
            echo "sync_failed=true" >> $GITHUB_OUTPUT
            exit 1
          }
          echo "sync_failed=false" >> $GITHUB_OUTPUT

      - name: Push changes
        if: steps.sync.outputs.sync_failed == 'false'
        run: git push origin main

      - name: Get upstream version
        if: steps.sync.outputs.sync_failed == 'false'
        id: version
        run: |
          UPSTREAM_TAG=$(git describe --tags --abbrev=0 upstream/main 2>/dev/null || echo "v0.0.0")
          echo "tag=${UPSTREAM_TAG}" >> $GITHUB_OUTPUT
          echo "Upstream tag: ${UPSTREAM_TAG}"

      - name: Check if tag exists on remote
        if: steps.sync.outputs.sync_failed == 'false'
        id: check_tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG exists on remote, will delete and recreate"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist, will create new"
          fi

      - name: Delete existing release and tag
        if: steps.sync.outputs.sync_failed == 'false' && steps.check_tag.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Delete GitHub release if exists
          if gh release view "$TAG" --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "Deleting existing release $TAG"
            gh release delete "$TAG" --repo ${{ github.repository }} --yes
          fi

          # Delete remote tag
          echo "Deleting remote tag $TAG"
          git push origin --delete "$TAG" || true

          # Delete local tag if exists
          git tag -d "$TAG" || true

      - name: Get upstream tag message
        if: steps.sync.outputs.sync_failed == 'false'
        id: tag_message
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          MESSAGE=$(git tag -l --format='%(contents)' "$TAG" upstream/main 2>/dev/null || echo "Release $TAG")
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: steps.sync.outputs.sync_failed == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          MESSAGE="${{ steps.tag_message.outputs.message }}"
          git tag -a "$TAG" -m "$MESSAGE"
          git push origin "$TAG"
          echo "Created and pushed tag $TAG"
