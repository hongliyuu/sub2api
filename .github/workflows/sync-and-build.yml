name: Sync Upstream

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

env:
  UPSTREAM_REPO: Wei-Shaw/sub2api
  UPSTREAM_REMOTE: upstream
  CONFLICT_LABEL: upstream-sync-conflict
  CONFLICT_TITLE: "automation: upstream sync conflict"

jobs:
  sync-upstream:
    name: sync-upstream
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add "$UPSTREAM_REMOTE" "https://github.com/$UPSTREAM_REPO.git" 2>/dev/null || true
          git fetch "$UPSTREAM_REMOTE" main --tags --force

      - name: Sync and push
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          UPSTREAM_SHA="$(git rev-parse "${UPSTREAM_REMOTE}/main")"
          UPSTREAM_SHORT="${UPSTREAM_SHA:0:7}"
          LATEST_TAG="$(git describe --tags --abbrev=0 "${UPSTREAM_REMOTE}/main" 2>/dev/null || true)"

          {
            echo "upstream_sha=$UPSTREAM_SHA"
            echo "upstream_short=$UPSTREAM_SHORT"
            echo "latest_tag=${LATEST_TAG:-}"
          } >> "$GITHUB_OUTPUT"

          if git merge-base --is-ancestor "$UPSTREAM_SHA" HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to sync"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

          set +e
          git merge "$UPSTREAM_SHA" --no-edit -m "sync: upstream/main @ $UPSTREAM_SHORT [skip ci]"
          merge_status=$?
          set -e

          if [ "$merge_status" -ne 0 ]; then
            CONFLICT_FILES="$(git diff --name-only --diff-filter=U | paste -sd ',' -)"
            echo "merge_conflict=true" >> "$GITHUB_OUTPUT"
            echo "conflict_files=${CONFLICT_FILES}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "merge_conflict=false" >> "$GITHUB_OUTPUT"
          git push origin main

      - name: Close stale conflict issue
        if: steps.sync.outputs.changed == 'false' || steps.sync.outputs.merge_conflict == 'false'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          ISSUE_NUMBER="$(gh issue list --label "$CONFLICT_LABEL" --state open --json number --jq '.[0].number' || true)"
          if [ -n "$ISSUE_NUMBER" ] && [ "$ISSUE_NUMBER" != "null" ]; then
            gh issue close "$ISSUE_NUMBER" --comment "Upstream sync is healthy again. Closing automatically from run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          fi

      - name: Create or update conflict issue
        if: steps.sync.outputs.merge_conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          BODY_FILE="$(mktemp)"
          {
            echo "Upstream sync hit a merge conflict."
            echo
            echo "- Upstream repository: \`$UPSTREAM_REPO\`"
            echo "- Upstream commit: \`${{ steps.sync.outputs.upstream_sha }}\`"
            echo "- Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            echo "Conflict files:"
            IFS=',' read -ra files <<< "${{ steps.sync.outputs.conflict_files }}"
            for file in "${files[@]}"; do
              [ -n "$file" ] && echo "- \`$file\`"
            done
          } > "$BODY_FILE"

          ISSUE_NUMBER="$(gh issue list --label "$CONFLICT_LABEL" --state open --json number --jq '.[0].number' || true)"
          if [ -n "$ISSUE_NUMBER" ] && [ "$ISSUE_NUMBER" != "null" ]; then
            gh issue edit "$ISSUE_NUMBER" --title "$CONFLICT_TITLE" --body-file "$BODY_FILE"
          else
            gh issue create --title "$CONFLICT_TITLE" --body-file "$BODY_FILE"
          fi

      - name: Stop on merge conflict
        if: steps.sync.outputs.merge_conflict == 'true'
        run: |
          echo "Upstream sync conflict recorded in issue tracker."
          exit 1
